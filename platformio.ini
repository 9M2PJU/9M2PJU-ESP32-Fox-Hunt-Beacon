[platformio]
default_envs = esp32dev

[env]
platform = espressif32@^6.7.0
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags =
  -D CORE_DEBUG_LEVEL=0

[env:esp32dev]
board = esp32dev

[env:esp32doit-devkit-v1]
board = esp32doit-devkit-v1

[env:lolin32]
board = lolin32

[env:esp32-s3-devkitc-1]
board = esp32-s3-devkitc-1
build_flags =
  ${env.build_flags}
  -D AUDIO_PIN=17
  -D BATTERY_PIN=4

[env:esp32-c3-devkitm-1]
board = esp32-c3-devkitm-1
build_flags =
  ${env.build_flags}
  -D PTT_PIN=7
  -D AUDIO_PIN=5
  -D LED_PIN=8
  -D BUTTON_PIN=9
  -D BATTERY_PIN=3
