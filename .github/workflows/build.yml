name: Build Firmware

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'include/**'
      - 'platformio.ini'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'include/**'
      - 'platformio.ini'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.env }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        env:
          # Generic ESP32 boards
          - esp32dev
          - esp32doit-devkit-v1
          - lolin32
          - esp32-s3-devkitc-1
          - esp32-c3-devkitm-1
          # Heltec OLED boards
          - heltec-wifi-kit-32
          - heltec-wifi-kit-32-v2
          - heltec-wifi-kit-32-v3
          - heltec-wifi-lora-32
          - heltec-wifi-lora-32-v2
          - heltec-wifi-lora-32-v3
          - heltec-wireless-stick
          - heltec-wireless-stick-lite
          - heltec-wireless-stick-lite-v3
          # Heltec TFT boards
          - heltec-wireless-tracker
          - heltec-vision-master-t190
          # Heltec E-Ink boards
          - heltec-wireless-paper
          - heltec-vision-master-e213
          - heltec-vision-master-e290
          # Heltec no-display boards
          - heltec-capsule-sensor-v3
          # LilyGO / TTGO OLED boards
          - ttgo-lora32-v1
          - ttgo-lora32-v2
          - ttgo-lora32-v21
          - ttgo-t-beam
          # LilyGO / TTGO TFT boards
          - lilygo-t-display
          - lilygo-t-display-s3
          - ttgo-t-watch
          # LilyGO / TTGO no-display boards
          - lilygo-t3-s3
          - ttgo-t-oi-plus
          - ttgo-t1
          - ttgo-t7-v13-mini32
          - ttgo-t7-v14-mini32

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio

      - name: Build ${{ matrix.env }}
        run: pio run -e ${{ matrix.env }}

      - name: Upload firmware artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: firmware-${{ matrix.env }}
          path: |
            .pio/build/${{ matrix.env }}/firmware.bin
            .pio/build/${{ matrix.env }}/firmware.elf
          if-no-files-found: ignore
          retention-days: 7
