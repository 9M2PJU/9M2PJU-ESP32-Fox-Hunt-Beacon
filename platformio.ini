[platformio]
default_envs = esp32dev

[env]
platform = espressif32@^6.7.0
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags =
  -D CORE_DEBUG_LEVEL=0

[env:esp32dev]
board = esp32dev

[env:esp32doit-devkit-v1]
board = esp32doit-devkit-v1

[env:lolin32]
board = lolin32

[env:esp32-s3-devkitc-1]
board = esp32-s3-devkitc-1
build_flags =
  ${env.build_flags}
  -D AUDIO_PIN=17
  -D BATTERY_PIN=4

[env:esp32-c3-devkitm-1]
board = esp32-c3-devkitm-1
build_flags =
  ${env.build_flags}
  -D PTT_PIN=7
  -D AUDIO_PIN=5
  -D LED_PIN=8
  -D BUTTON_PIN=9
  -D BATTERY_PIN=3

[heltec_esp32_common]
build_flags =
  ${env.build_flags}
  -D PTT_PIN=13
  -D AUDIO_PIN=17
  -D LED_PIN=25
  -D BUTTON_PIN=0
  -D BATTERY_PIN=36

[heltec_esp32s3_common]
build_flags =
  ${env.build_flags}
  -D PTT_PIN=6
  -D AUDIO_PIN=7
  -D LED_PIN=35
  -D BUTTON_PIN=0
  -D BATTERY_PIN=1

[env:heltec-wifi-kit-32]
board = heltec_wifi_kit_32
build_flags = ${heltec_esp32_common.build_flags}

[env:heltec-wifi-kit-32-v2]
board = heltec_wifi_kit_32_v2
build_flags = ${heltec_esp32_common.build_flags}

[env:heltec-wifi-kit-32-v3]
board = heltec_wifi_kit_32_V3
build_flags = ${heltec_esp32s3_common.build_flags}

[env:heltec-wifi-lora-32]
board = heltec_wifi_lora_32
build_flags = ${heltec_esp32_common.build_flags}

[env:heltec-wifi-lora-32-v2]
board = heltec_wifi_lora_32_V2
build_flags = ${heltec_esp32_common.build_flags}

[env:heltec-wifi-lora-32-v3]
board = heltec_wifi_lora_32_V3
build_flags = ${heltec_esp32s3_common.build_flags}

[env:heltec-wireless-stick]
board = heltec_wireless_stick
build_flags = ${heltec_esp32_common.build_flags}

[env:heltec-wireless-stick-lite]
board = heltec_wireless_stick_lite
build_flags = ${heltec_esp32_common.build_flags}

; Compatibility build because this installed PlatformIO package includes the
; Arduino variant but not a dedicated board JSON.
[env:heltec-wireless-stick-lite-v3]
board = esp32-s3-devkitc-1
board_build.variant = heltec_wireless_stick_lite_v3
build_flags = ${heltec_esp32s3_common.build_flags}

; Compatibility build for Heltec Wireless Tracker. PlatformIO's installed
; espressif32 package does not ship a dedicated board ID for this board, so this
; uses the generic ESP32-S3 DevKit board definition plus explicit pins.
[env:heltec-wireless-tracker]
board = esp32-s3-devkitc-1
build_flags = ${heltec_esp32s3_common.build_flags}
