[platformio]
default_envs = esp32dev

[env]
platform = espressif32@^6.7.0
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags =
  -D CORE_DEBUG_LEVEL=0

; --- Display shared sections ---

; OLED SSD1306 on classic ESP32 boards (Heltec, TTGO LoRa32 V1).
; I2C: SDA=4, SCL=15, RST=16.
[oled_classic]
lib_deps =
  U8g2 @ ^2.28.8
build_flags =
  ${env.build_flags}
  -D DISPLAY_TYPE=1
  -D OLED_SDA=4
  -D OLED_SCL=15
  -D OLED_RST=16

; OLED SSD1306 on ESP32-S3 Heltec boards.
; I2C: SDA=17, SCL=18, RST=16.
[oled_s3]
lib_deps =
  U8g2 @ ^2.28.8
build_flags =
  ${env.build_flags}
  -D DISPLAY_TYPE=1
  -D OLED_SDA=17
  -D OLED_SCL=18
  -D OLED_RST=16

; OLED SSD1306 on TTGO LoRa32 V2.
; I2C: SDA=21, SCL=22, RST=16.
[oled_lora_v2]
lib_deps =
  U8g2 @ ^2.28.8
build_flags =
  ${env.build_flags}
  -D DISPLAY_TYPE=1
  -D OLED_SDA=21
  -D OLED_SCL=22
  -D OLED_RST=16

; OLED SSD1306 on TTGO LoRa32 V2.1.6.
; I2C: SDA=8, SCL=9, RST=16.
[oled_lora_v21]
lib_deps =
  U8g2 @ ^2.28.8
build_flags =
  ${env.build_flags}
  -D DISPLAY_TYPE=1
  -D OLED_SDA=8
  -D OLED_SCL=9
  -D OLED_RST=16

; OLED SSD1306 on TTGO T-Beam.
; I2C: SDA=21, SCL=22, RST=16.
[oled_tbeam]
lib_deps =
  U8g2 @ ^2.28.8
build_flags =
  ${env.build_flags}
  -D DISPLAY_TYPE=1
  -D OLED_SDA=21
  -D OLED_SCL=22
  -D OLED_RST=16

; TFT ST7789 on LilyGO T-Display (135x240, classic ESP32).
[tft_tdisplay]
lib_deps =
  TFT_eSPI @ ^2.5.0
build_flags =
  ${env.build_flags}
  -D DISPLAY_TYPE=2
  -D USER_SETUP_LOADED=1
  -D ST7789_DRIVER=1
  -D TFT_WIDTH=240
  -D TFT_HEIGHT=135
  -D TFT_MOSI=19
  -D TFT_SCLK=18
  -D TFT_CS=5
  -D TFT_DC=16
  -D TFT_RST=23
  -D TFT_BL=4
  -D SPI_FREQUENCY=40000000

; TFT ST7789 on LilyGO T-Display S3 (170x320, ESP32-S3).
[tft_tdisplay_s3]
lib_deps =
  TFT_eSPI @ ^2.5.0
build_flags =
  ${env.build_flags}
  -D DISPLAY_TYPE=2
  -D USER_SETUP_LOADED=1
  -D ST7789_DRIVER=1
  -D TFT_WIDTH=320
  -D TFT_HEIGHT=170
  -D TFT_MOSI=13
  -D TFT_SCLK=14
  -D TFT_CS=10
  -D TFT_DC=11
  -D TFT_RST=12
  -D TFT_BL=2
  -D SPI_FREQUENCY=40000000

; TFT ST7789 on TTGO T-Watch (240x240, classic ESP32).
[tft_twatch]
lib_deps =
  TFT_eSPI @ ^2.5.0
build_flags =
  ${env.build_flags}
  -D DISPLAY_TYPE=2
  -D USER_SETUP_LOADED=1
  -D ST7789_DRIVER=1
  -D TFT_WIDTH=240
  -D TFT_HEIGHT=240
  -D TFT_MOSI=19
  -D TFT_SCLK=18
  -D TFT_CS=5
  -D TFT_DC=27
  -D TFT_RST=33
  -D TFT_BL=12
  -D SPI_FREQUENCY=40000000

; TFT ST7735 on Heltec Wireless Tracker (160x80, ESP32-S3).
; VEXT=3 (active HIGH), BL=21, CS=38, DC=40, RST=39, SCLK=41, MOSI=42.
[tft_heltec_tracker]
lib_deps =
  TFT_eSPI @ ^2.5.0
build_flags =
  ${env.build_flags}
  -D DISPLAY_TYPE=2
  -D USER_SETUP_LOADED=1
  -D ST7735_DRIVER=1
  -D TFT_WIDTH=160
  -D TFT_HEIGHT=80
  -D TFT_MOSI=42
  -D TFT_SCLK=41
  -D TFT_CS=38
  -D TFT_DC=40
  -D TFT_RST=39
  -D TFT_BL=21
  -D TFT_OFFSET_X=1
  -D TFT_OFFSET_Y=26
  -D SPI_FREQUENCY=40000000

; TFT ST7789 on Heltec Vision Master T190 (170x320, ESP32-S3).
; VEXT=5, BL=17, SCK=38, MOSI=48, CS=39, DC=47, RST=40.
[tft_heltec_vmt190]
lib_deps =
  TFT_eSPI @ ^2.5.0
build_flags =
  ${env.build_flags}
  -D DISPLAY_TYPE=2
  -D USER_SETUP_LOADED=1
  -D ST7789_DRIVER=1
  -D TFT_WIDTH=320
  -D TFT_HEIGHT=170
  -D TFT_MOSI=48
  -D TFT_SCLK=38
  -D TFT_CS=39
  -D TFT_DC=47
  -D TFT_RST=40
  -D TFT_BL=17
  -D SPI_FREQUENCY=40000000

; E-Ink SSD1680 on Heltec Wireless Paper (250x122, ESP32-S3).
; SCLK=3, MOSI=2, CS=4, DC=5, RST=6, BUSY=7, VEXT=45 (active LOW).
[eink_heltec_paper]
lib_deps =
  GxEPD2 @ ^1.5.6
build_flags =
  ${env.build_flags}
  -D DISPLAY_TYPE=3
  -D EINK_SCLK=3
  -D EINK_MOSI=2
  -D EINK_CS=4
  -D EINK_DC=5
  -D EINK_RST=6
  -D EINK_BUSY=7
  -D EINK_VEXT=45
  -D EINK_VEXT_ACTIVE_LOW=1
  -D EINK_WIDTH=250
  -D EINK_HEIGHT=122

; E-Ink SSD1680 on Heltec Vision Master E213 (250x122, ESP32-S3).
; CLK=4, SDI=6, CS=5, DC=2, RST=3, BUSY=1.
[eink_heltec_vme213]
lib_deps =
  GxEPD2 @ ^1.5.6
build_flags =
  ${env.build_flags}
  -D DISPLAY_TYPE=3
  -D EINK_SCLK=4
  -D EINK_MOSI=6
  -D EINK_CS=5
  -D EINK_DC=2
  -D EINK_RST=3
  -D EINK_BUSY=1
  -D EINK_WIDTH=250
  -D EINK_HEIGHT=122

; E-Ink SSD1680 on Heltec Vision Master E290 (296x128, ESP32-S3).
; SDI=1, CLK=2, CS=3, DC=4, RST=5, BUSY=6.
[eink_heltec_vme290]
lib_deps =
  GxEPD2 @ ^1.5.6
build_flags =
  ${env.build_flags}
  -D DISPLAY_TYPE=3
  -D EINK_SCLK=2
  -D EINK_MOSI=1
  -D EINK_CS=3
  -D EINK_DC=4
  -D EINK_RST=5
  -D EINK_BUSY=6
  -D EINK_WIDTH=296
  -D EINK_HEIGHT=128

; --- Pin shared sections (existing, unchanged) ---

[heltec_esp32_common]
build_flags =
  ${env.build_flags}
  -D PTT_PIN=13
  -D AUDIO_PIN=17
  -D LED_PIN=25
  -D BUTTON_PIN=0
  -D BATTERY_PIN=36

[heltec_esp32s3_common]
build_flags =
  ${env.build_flags}
  -D PTT_PIN=6
  -D AUDIO_PIN=7
  -D LED_PIN=35
  -D BUTTON_PIN=0
  -D BATTERY_PIN=1

; Pin assignments for Heltec Wireless Tracker (ESP32-S3).
; Uses different pins than other Heltec S3 boards due to TFT + GPS.
[heltec_tracker_common]
build_flags =
  ${env.build_flags}
  -D PTT_PIN=7
  -D AUDIO_PIN=6
  -D LED_PIN=18
  -D BUTTON_PIN=0
  -D BATTERY_PIN=1

; Pin assignments for Heltec Vision Master series (ESP32-S3).
; LoRa on SPI0 (SCK=9, MOSI=10, MISO=11, CS=8), display on separate SPI.
[heltec_vision_common]
build_flags =
  ${env.build_flags}
  -D PTT_PIN=4
  -D AUDIO_PIN=3
  -D LED_PIN=18
  -D BUTTON_PIN=0
  -D BATTERY_PIN=6

[lilygo_esp32_common]
build_flags =
  ${env.build_flags}
  -D PTT_PIN=25
  -D AUDIO_PIN=26
  -D LED_PIN=2
  -D BUTTON_PIN=0
  -D BATTERY_PIN=34

[lilygo_lora_esp32_common]
build_flags =
  ${env.build_flags}
  -D PTT_PIN=25
  -D AUDIO_PIN=13
  -D LED_PIN=2
  -D BUTTON_PIN=0
  -D BATTERY_PIN=35

[lilygo_tbeam_common]
build_flags =
  ${env.build_flags}
  -D PTT_PIN=25
  -D AUDIO_PIN=13
  -D LED_PIN=4
  -D BUTTON_PIN=0
  -D BATTERY_PIN=35

[lilygo_esp32s3_common]
build_flags =
  ${env.build_flags}
  -D PTT_PIN=6
  -D AUDIO_PIN=7
  -D LED_PIN=38
  -D BUTTON_PIN=0
  -D BATTERY_PIN=4

[lilygo_esp32c3_common]
build_flags =
  ${env.build_flags}
  -D PTT_PIN=7
  -D AUDIO_PIN=5
  -D LED_PIN=8
  -D BUTTON_PIN=9
  -D BATTERY_PIN=3

; --- Board environments ---

; No-display boards (web admin only).

[env:esp32dev]
board = esp32dev

[env:esp32doit-devkit-v1]
board = esp32doit-devkit-v1

[env:lolin32]
board = lolin32

[env:esp32-s3-devkitc-1]
board = esp32-s3-devkitc-1
build_flags =
  ${env.build_flags}
  -D AUDIO_PIN=17
  -D BATTERY_PIN=4

[env:esp32-c3-devkitm-1]
board = esp32-c3-devkitm-1
build_flags =
  ${env.build_flags}
  -D PTT_PIN=7
  -D AUDIO_PIN=5
  -D LED_PIN=8
  -D BUTTON_PIN=9
  -D BATTERY_PIN=3

; OLED display boards (web admin + status display).

[env:heltec-wifi-kit-32]
board = heltec_wifi_kit_32
build_flags =
  ${heltec_esp32_common.build_flags}
  ${oled_classic.build_flags}
lib_deps =
  ${oled_classic.lib_deps}

[env:heltec-wifi-kit-32-v2]
board = heltec_wifi_kit_32_v2
build_flags =
  ${heltec_esp32_common.build_flags}
  ${oled_classic.build_flags}
lib_deps =
  ${oled_classic.lib_deps}

[env:heltec-wifi-kit-32-v3]
board = heltec_wifi_kit_32_V3
build_flags =
  ${heltec_esp32s3_common.build_flags}
  ${oled_s3.build_flags}
lib_deps =
  ${oled_s3.lib_deps}

[env:heltec-wifi-lora-32]
board = heltec_wifi_lora_32
build_flags =
  ${heltec_esp32_common.build_flags}
  ${oled_classic.build_flags}
lib_deps =
  ${oled_classic.lib_deps}

[env:heltec-wifi-lora-32-v2]
board = heltec_wifi_lora_32_V2
build_flags =
  ${heltec_esp32_common.build_flags}
  ${oled_classic.build_flags}
lib_deps =
  ${oled_classic.lib_deps}

[env:heltec-wifi-lora-32-v3]
board = heltec_wifi_lora_32_V3
build_flags =
  ${heltec_esp32s3_common.build_flags}
  ${oled_s3.build_flags}
lib_deps =
  ${oled_s3.lib_deps}

[env:heltec-wireless-stick]
board = heltec_wireless_stick
build_flags =
  ${heltec_esp32_common.build_flags}
  ${oled_classic.build_flags}
lib_deps =
  ${oled_classic.lib_deps}

[env:heltec-wireless-stick-lite]
board = heltec_wireless_stick_lite
build_flags =
  ${heltec_esp32_common.build_flags}
  ${oled_classic.build_flags}
lib_deps =
  ${oled_classic.lib_deps}

; Compatibility build because this installed PlatformIO package includes the
; Arduino variant but not a dedicated board JSON.
[env:heltec-wireless-stick-lite-v3]
board = esp32-s3-devkitc-1
board_build.variant = heltec_wireless_stick_lite_v3
build_flags =
  ${heltec_esp32s3_common.build_flags}
  ${oled_s3.build_flags}
lib_deps =
  ${oled_s3.lib_deps}

; Heltec Wireless Tracker (ESP32-S3, TFT ST7735 160x80).
; No dedicated PlatformIO board ID — uses generic ESP32-S3 DevKit.
[env:heltec-wireless-tracker]
board = esp32-s3-devkitc-1
build_flags =
  ${heltec_tracker_common.build_flags}
  ${tft_heltec_tracker.build_flags}
lib_deps =
  ${tft_heltec_tracker.lib_deps}

; Heltec Vision Master T190 (ESP32-S3, TFT ST7789 170x320).
; No dedicated PlatformIO board ID — uses generic ESP32-S3 DevKit.
[env:heltec-vision-master-t190]
board = esp32-s3-devkitc-1
build_flags =
  ${heltec_vision_common.build_flags}
  ${tft_heltec_vmt190.build_flags}
lib_deps =
  ${tft_heltec_vmt190.lib_deps}

; Heltec Wireless Paper (ESP32-S3, E-Ink 250x122).
; No dedicated PlatformIO board ID — uses generic ESP32-S3 DevKit.
[env:heltec-wireless-paper]
board = esp32-s3-devkitc-1
build_flags =
  ${heltec_vision_common.build_flags}
  ${eink_heltec_paper.build_flags}
lib_deps =
  ${eink_heltec_paper.lib_deps}

; Heltec Vision Master E213 (ESP32-S3, E-Ink 250x122).
[env:heltec-vision-master-e213]
board = esp32-s3-devkitc-1
build_flags =
  ${heltec_vision_common.build_flags}
  ${eink_heltec_vme213.build_flags}
lib_deps =
  ${eink_heltec_vme213.lib_deps}

; Heltec Vision Master E290 (ESP32-S3, E-Ink 296x128).
[env:heltec-vision-master-e290]
board = esp32-s3-devkitc-1
build_flags =
  ${heltec_vision_common.build_flags}
  ${eink_heltec_vme290.build_flags}
lib_deps =
  ${eink_heltec_vme290.lib_deps}

; Heltec Capsule Sensor V3 (ESP32-S3, no display).
; No dedicated PlatformIO board ID — uses generic ESP32-S3 DevKit.
[env:heltec-capsule-sensor-v3]
board = esp32-s3-devkitc-1
build_flags =
  ${heltec_vision_common.build_flags}

[env:ttgo-lora32-v1]
board = ttgo-lora32-v1
build_flags =
  ${lilygo_lora_esp32_common.build_flags}
  ${oled_classic.build_flags}
lib_deps =
  ${oled_classic.lib_deps}

[env:ttgo-lora32-v2]
board = ttgo-lora32-v2
build_flags =
  ${lilygo_lora_esp32_common.build_flags}
  ${oled_lora_v2.build_flags}
lib_deps =
  ${oled_lora_v2.lib_deps}

[env:ttgo-lora32-v21]
board = ttgo-lora32-v21
build_flags =
  ${lilygo_lora_esp32_common.build_flags}
  ${oled_lora_v21.build_flags}
lib_deps =
  ${oled_lora_v21.lib_deps}

[env:ttgo-t-beam]
board = ttgo-t-beam
build_flags =
  ${lilygo_tbeam_common.build_flags}
  ${oled_tbeam.build_flags}
lib_deps =
  ${oled_tbeam.lib_deps}

; TFT display boards (web admin + status display).

[env:lilygo-t-display]
board = lilygo-t-display
build_flags =
  ${lilygo_esp32_common.build_flags}
  ${tft_tdisplay.build_flags}
lib_deps =
  ${tft_tdisplay.lib_deps}

[env:lilygo-t-display-s3]
board = lilygo-t-display-s3
build_flags =
  ${lilygo_esp32s3_common.build_flags}
  ${tft_tdisplay_s3.build_flags}
lib_deps =
  ${tft_tdisplay_s3.lib_deps}

[env:ttgo-t-watch]
board = ttgo-t-watch
build_flags =
  ${lilygo_esp32_common.build_flags}
  ${tft_twatch.build_flags}
lib_deps =
  ${tft_twatch.lib_deps}

; No-display boards (web admin only).

[env:lilygo-t3-s3]
board = lilygo-t3-s3
build_flags = ${lilygo_esp32s3_common.build_flags}

[env:ttgo-t-oi-plus]
board = ttgo-t-oi-plus
build_flags = ${lilygo_esp32c3_common.build_flags}

[env:ttgo-t1]
board = ttgo-t1
build_flags = ${lilygo_esp32_common.build_flags}

[env:ttgo-t7-v13-mini32]
board = ttgo-t7-v13-mini32
build_flags = ${lilygo_esp32_common.build_flags}

[env:ttgo-t7-v14-mini32]
board = ttgo-t7-v14-mini32
build_flags = ${lilygo_esp32_common.build_flags}
